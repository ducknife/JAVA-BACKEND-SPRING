<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học backend spring boot</title>
</head>
<body>
    <h2>Danh sách Category</h2>
    
    <ul id="category-list">
        <li>Đang tải dữ liệu...</li>
    </ul>

    <script>
        // 1. Đường dẫn API (Sửa lại port nếu bạn dùng khác 8080)
        const API_URL = 'http://localhost:8080/api/categories';

        // 2. Hàm gọi API
        async function fetchCategories() {
            try {
                // Gọi lên server
                const response = await fetch(API_URL);
                
                // Kiểm tra nếu lỗi mạng hoặc server trả về lỗi (404, 500)
                if (!response.ok) {
                    throw new Error('Lỗi kết nối server');
                }

                // Chuyển đổi dữ liệu nhận được sang JSON
                const result = await response.json();
                
                // 3. Gọi hàm hiển thị ra màn hình
                // Lưu ý: result.data vì bạn dùng ApiResponse bọc dữ liệu
                renderData(result.data); 

            } catch (error) {
                console.error('Có lỗi xảy ra:', error);
                document.getElementById('category-list').innerHTML = `<li style="color:red">Lỗi: ${error.message}</li>`;
            }
        }

        // 4. Hàm hiển thị dữ liệu lên thẻ UL
        function renderData(categories) {
            const ulElement = document.getElementById('category-list');
            
            // Xóa nội dung cũ (dòng "Đang tải...")
            ulElement.innerHTML = '';

            // Duyệt qua từng phần tử và tạo thẻ li
            const htmlContent = categories.map(cat => {
                return `<li>ID: <strong>${cat.id}</strong> - Name: <strong>${cat.name}</strong></li>`;
            }).join(''); // Nối tất cả lại thành 1 chuỗi HTML

            // Gán vào trong thẻ UL
            ulElement.innerHTML = htmlContent;
        }

        // Chạy hàm khi trang web tải xong
        fetchCategories();
    </script>
</body>
</html>
